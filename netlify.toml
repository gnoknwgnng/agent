[build]
  publish = "public"
  command = "npm run build"

[functions]
  directory = "netlify/functions"

[functions."process-queue"]
  schedule = "*/10 * * * *"

[[redirects]]
  from = "/api/*"
  to = "/.netlify/functions/:splat"
  status = 200

[[redirects]]
  from = "/*"
  to = "/index.html"
  status = 200
